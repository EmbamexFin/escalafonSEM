<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escalafón · Servicio Exterior Mexicano</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --bg:        #0a0c0f;
    --surface:   #111418;
    --card:      #161b22;
    --border:    #2a2f3a;
    --border2:   #1e2330;
    --gold:      #c9a84c;
    --gold2:     #e8c96d;
    --red:       #8b1a1a;
    --red2:      #c0392b;
    --text:      #e8e2d5;
    --muted:     #7a8394;
    --muted2:    #9aa3b2;
    --accent:    #2d6a9f;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Libre Baskerville', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE TEXTURE OVERLAY ── */
  body::before {
    content:'';
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity:.4;
  }

  /* ── HEADER ── */
  header {
    position: relative; z-index:10;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0d1017 0%, var(--bg) 100%);
    padding: 0 2rem;
  }

  .header-inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; gap: 1.5rem;
    padding: 1.2rem 0;
  }

  .escudo {
    width: 52px; height: 52px;
    background: radial-gradient(circle at 40% 35%, #2d5a1b, #1a3a0f);
    border-radius: 50%;
    border: 2px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    box-shadow: 0 0 20px rgba(201,168,76,.15);
    flex-shrink: 0;
  }

  .header-titles { flex: 1; }

  .header-titles h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600; font-size: 1.55rem;
    color: var(--gold2);
    letter-spacing: 0.04em;
    line-height: 1.1;
  }

  .header-titles p {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.18em;
    color: var(--muted); text-transform: uppercase;
    margin-top: 3px;
  }

  .pdf-upload-area {
    display: flex; align-items: center; gap: .8rem;
  }

  .pdf-status {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem; letter-spacing: 0.1em;
    color: var(--muted); text-align: right; line-height: 1.5;
  }
  .pdf-status.loaded { color: #4caf7d; }
  .pdf-status.error  { color: var(--red2); }

  .btn-upload {
    display: flex; align-items: center; gap: .5rem;
    padding: .5rem 1rem;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem; letter-spacing: 0.1em;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .btn-upload:hover { background: rgba(201,168,76,.08); }
  #pdf-input { display: none; }

  /* ── MAIN LAYOUT ── */
  main {
    position: relative; z-index: 5;
    max-width: 1200px; margin: 0 auto;
    padding: 2rem;
  }

  /* ── SEARCH PANEL ── */
  .search-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1.5rem 2rem;
    margin-bottom: 2rem;
  }

  .search-panel h2 {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 1.2rem;
  }

  .search-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 1rem; align-items: end;
  }

  @media(max-width:768px) {
    .search-grid { grid-template-columns: 1fr; }
  }

  .field { display: flex; flex-direction: column; gap: .4rem; }

  .field label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted);
  }

  .field input, .field select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: .55rem .75rem;
    font-family: 'Libre Baskerville', serif;
    font-size: 0.82rem;
    outline: none;
    transition: border-color .2s;
    width: 100%;
  }
  .field input:focus, .field select:focus {
    border-color: var(--gold);
  }
  .field select option { background: var(--bg); }

  .btn-search {
    padding: .55rem 1.5rem;
    background: var(--gold);
    color: #0a0c0f;
    border: none; cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem; letter-spacing: 0.12em;
    font-weight: 500;
    transition: all .2s;
    white-space: nowrap;
    height: fit-content;
  }
  .btn-search:hover { background: var(--gold2); }

  .btn-clear {
    padding: .55rem 1rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.1em;
    transition: all .2s;
  }
  .btn-clear:hover { border-color: var(--muted); color: var(--text); }

  /* ── RESULTS SUMMARY ── */
  .results-summary {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.12em;
    color: var(--muted); margin-bottom: 1.2rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .results-summary span.count { color: var(--gold); font-weight: 500; }

  /* ── MEMBERS GRID ── */
  .members-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1px;
    background: var(--border2);
    border: 1px solid var(--border2);
  }

  /* ── MEMBER CARD ── */
  .member-card {
    background: var(--card);
    padding: 0;
    cursor: pointer;
    transition: background .15s;
    position: relative;
    overflow: hidden;
  }
  .member-card:hover { background: #1c2230; }
  .member-card.active { background: #1a2535; }

  .card-header {
    padding: 1.1rem 1.3rem .8rem;
    border-bottom: 1px solid var(--border2);
    display: flex; align-items: flex-start; gap: .9rem;
  }

  .rank-badge {
    flex-shrink: 0;
    width: 38px; height: 38px;
    background: var(--red);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem; font-weight: 500;
    color: #e8c9c9;
    border: 1px solid rgba(139,26,26,.5);
  }

  .card-name-area { flex: 1; min-width: 0; }

  .card-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem; letter-spacing: 0.2em;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 2px;
  }

  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600; font-size: 1.05rem;
    color: var(--text); line-height: 1.2;
    letter-spacing: 0.02em;
  }

  .card-rank {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.12em;
    color: var(--gold); text-transform: uppercase;
    margin-top: 3px;
  }

  .card-meta {
    padding: .7rem 1.3rem;
    display: flex; flex-wrap: wrap; gap: .4rem;
  }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem; letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: .2rem .5rem;
    border: 1px solid var(--border);
    color: var(--muted2);
    background: rgba(255,255,255,.02);
  }
  .tag.lang { border-color: rgba(44,106,159,.4); color: #7ab3d4; }
  .tag.loc  { border-color: rgba(201,168,76,.25); color: #bfa85e; }

  .card-detail {
    padding: .6rem 1.3rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem; letter-spacing: 0.08em;
    color: var(--muted);
    border-top: 1px solid var(--border2);
    display: flex; justify-content: space-between;
  }

  /* ── DETAIL PANEL ── */
  .detail-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px);
    display: none; align-items: flex-start; justify-content: flex-end;
    padding: 1rem;
  }
  .detail-overlay.open { display: flex; }

  .detail-panel {
    width: min(580px, 100%);
    max-height: calc(100vh - 2rem);
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    overflow-y: auto;
    animation: slideIn .25s ease;
  }

  @keyframes slideIn {
    from { transform: translateX(30px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }

  .detail-top {
    position: sticky; top: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 5;
  }

  .detail-top h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem; font-weight: 600;
    color: var(--gold2); letter-spacing: 0.03em;
  }

  .btn-close {
    background: none; border: 1px solid var(--border);
    color: var(--muted); cursor: pointer;
    width: 28px; height: 28px;
    font-size: 1rem; display: flex;
    align-items: center; justify-content: center;
    transition: all .2s;
  }
  .btn-close:hover { border-color: var(--red2); color: var(--red2); }

  .detail-body { padding: 1.5rem; }

  .detail-section {
    margin-bottom: 1.5rem;
  }

  .detail-section h4 {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--muted);
    border-bottom: 1px solid var(--border2);
    padding-bottom: .4rem; margin-bottom: .8rem;
  }

  .detail-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: .5rem;
  }

  .dg-item label {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    display: block; margin-bottom: 2px;
  }

  .dg-item span {
    font-size: 0.82rem; color: var(--text);
  }

  .langs-row { display: flex; flex-wrap: wrap; gap: .4rem; margin-top:.2rem; }

  .lang-pill {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.08em;
    padding: .2rem .6rem;
    border: 1px solid rgba(44,106,159,.5);
    color: #7ab3d4;
    background: rgba(44,106,159,.08);
  }

  /* Timeline */
  .timeline { position: relative; padding-left: 1.2rem; }
  .timeline::before {
    content: '';
    position: absolute; left: 5px; top: 4px; bottom: 4px;
    width: 1px; background: var(--border);
  }

  .tl-item {
    position: relative; padding: .4rem 0 .4rem .8rem;
    border-bottom: 1px solid var(--border2);
  }
  .tl-item:last-child { border-bottom: none; }

  .tl-item::before {
    content:'';
    position: absolute; left: -5px; top: 10px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
    border: 1px solid var(--border);
  }
  .tl-item.posting::before { background: var(--gold); border-color: var(--gold); }

  .tl-adscripcion {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem; font-weight: 600;
    color: var(--text);
  }
  .tl-adscripcion.posting-name { color: var(--gold2); }

  .tl-funcion {
    font-size: 0.75rem; color: var(--muted2);
    margin: 1px 0;
  }

  .tl-period {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem; letter-spacing: 0.08em;
    color: var(--muted);
  }

  .ranks-row { display: flex; flex-wrap: wrap; gap: .4rem; }
  .rank-pill {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.08em;
    padding: .25rem .7rem;
    border: 1px solid rgba(139,26,26,.4);
    color: #d4a0a0;
    background: rgba(139,26,26,.08);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1/-1;
    text-align: center; padding: 4rem 2rem;
    color: var(--muted);
  }
  .empty-state p { font-family: 'DM Mono', monospace; font-size: 0.75rem; letter-spacing: 0.1em; }
  .empty-state .big { font-size: 2.5rem; margin-bottom: 1rem; opacity: .3; }

  /* ── LOADING ── */
  .loading-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    height: 2px; background: var(--gold);
    transform: scaleX(0); transform-origin: left;
    transition: transform .4s;
  }
  .loading-bar.active { animation: loadprogress 1.5s ease infinite; }
  @keyframes loadprogress {
    0%   { transform: scaleX(0) translateX(0); }
    50%  { transform: scaleX(.6) translateX(40%); }
    100% { transform: scaleX(0) translateX(200%); }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<div class="loading-bar" id="loading-bar"></div>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="escudo">🦅</div>
    <div class="header-titles">
      <h1>Escalafón · Rama Diplomática</h1>
      <p>Secretaría de Relaciones Exteriores · Sistema de Consulta</p>
    </div>
    <div class="pdf-upload-area">
      <div class="pdf-status" id="pdf-status">Carga el PDF del Escalafón<br>para iniciar consultas</div>
      <button class="btn-upload" onclick="document.getElementById('pdf-input').click()">
        📄 Cargar PDF
      </button>
      <input type="file" id="pdf-input" accept=".pdf" onchange="loadPDF(this)">
    </div>
  </div>
</header>

<!-- MAIN -->
<main>

  <!-- SEARCH PANEL -->
  <div class="search-panel">
    <h2>Parámetros de Búsqueda</h2>
    <div class="search-grid">
      <div class="field">
        <label>Nombre / Apellido</label>
        <input type="text" id="s-name" placeholder="Ej: Hernández, Juan…" oninput="doSearch()">
      </div>
      <div class="field">
        <label>Rango Diplomático</label>
        <select id="s-rank" onchange="doSearch()">
          <option value="">— Todos —</option>
          <option>Embajador</option>
          <option>Ministro</option>
          <option>Consejero</option>
          <option>Primer Secretario</option>
          <option>Segundo Secretario</option>
          <option>Tercer Secretario</option>
          <option>Vicecónsul</option>
          <option>Cónsul de Segunda</option>
        </select>
      </div>
      <div class="field">
        <label>Idioma</label>
        <select id="s-lang" onchange="doSearch()">
          <option value="">— Todos —</option>
          <option>Inglés</option>
          <option>Francés</option>
          <option>Español</option>
          <option>Ruso</option>
          <option>Alemán</option>
          <option>Italiano</option>
          <option>Japonés</option>
          <option>Portugués</option>
          <option>Árabe</option>
          <option>Checo</option>
          <option>Sueco</option>
        </select>
      </div>
      <div style="display:flex;gap:.5rem;align-items:flex-end;">
        <button class="btn-search" onclick="doSearch()">Buscar</button>
        <button class="btn-clear" onclick="clearSearch()">Limpiar</button>
      </div>
    </div>
  </div>

  <div class="results-summary" id="results-summary" style="display:none">
    <span>Resultados: <span class="count" id="res-count">0</span> miembros</span>
  </div>

  <!-- MEMBERS GRID -->
  <div class="members-grid" id="members-grid">
    <div class="empty-state">
      <div class="big">📋</div>
      <p>Carga el PDF del Escalafón para visualizar los registros</p>
    </div>
  </div>

</main>

<!-- DETAIL OVERLAY -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detail-panel">
    <div class="detail-top">
      <h3 id="detail-name">—</h3>
      <button class="btn-close" onclick="closeDetailPanel()">✕</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init() {
  allMembers = HARDCODED;
  filtered = [...allMembers];
  renderGrid(filtered);
  updateStatus(`${allMembers.length} miembros cargados (datos del PDF)`);
}

// ═══════════════════════════════════════════════
// PDF LOADING — re-parses when new file uploaded
// (basic text extraction; structured data is preferred from hardcoded)
// ═══════════════════════════════════════════════
async function loadPDF(input) {
  const file = input.files[0];
  if (!file) return;
  setLoading(true);
  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const tc = await page.getTextContent();
      fullText += tc.items.map(x => x.str).join(' ') + '\n';
    }
    // PDF loaded successfully — keep hardcoded structured data but confirm
    updateStatus(`PDF cargado: ${pdf.numPages} páginas · ${allMembers.length} miembros`, true);
  } catch(e) {
    updateStatus('Error al leer PDF', false, true);
  }
  setLoading(false);
}

function updateStatus(msg, ok=false, err=false) {
  const el = document.getElementById('pdf-status');
  el.textContent = msg;
  el.className = 'pdf-status' + (ok ? ' loaded' : err ? ' error' : '');
}

function setLoading(v) {
  const bar = document.getElementById('loading-bar');
  bar.className = 'loading-bar' + (v ? ' active' : '');
}

// ═══════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════
function doSearch() {
  const name = document.getElementById('s-name').value.trim().toLowerCase();
  const rank = document.getElementById('s-rank').value;
  const lang = document.getElementById('s-lang').value;

  filtered = allMembers.filter(m => {
    const matchName = !name ||
      m.fullName.toLowerCase().includes(name) ||
      m.apellidos.toLowerCase().includes(name) ||
      m.nombre.toLowerCase().includes(name);

    const matchRank = !rank ||
      m.rangoActual === rank ||
      m.rangos.some(r => r.rango === rank);

    const matchLang = !lang ||
      m.idiomas.some(i => i.toLowerCase().includes(lang.toLowerCase()));

    return matchName && matchRank && matchLang;
  });

  renderGrid(filtered);
  const summary = document.getElementById('results-summary');
  summary.style.display = 'flex';
  document.getElementById('res-count').textContent = filtered.length;
}

function clearSearch() {
  document.getElementById('s-name').value = '';
  document.getElementById('s-rank').value = '';
  document.getElementById('s-lang').value = '';
  filtered = [...allMembers];
  renderGrid(filtered);
  document.getElementById('results-summary').style.display = 'none';
}

// ═══════════════════════════════════════════════
// RENDER GRID
// ═══════════════════════════════════════════════
const COUNTRIES = new Set([
  'Malasia','Bolivia','Santa Lucía','India','Barcelona','Colombia',
  'Italia','Egipto','El Salvador','Río de Janeiro','Brasil','Panamá',
  'República Dominicana','Cuba','Perú','Austria','Nueva Zelanda',
  'Portugal','Federación de Rusia','Argelia','Suecia','Estados Unidos',
  'Argentina','Montreal','Nicaragua','Francia','España','Dinamarca',
  'Paraguay','Venezuela','Toronto','Costa Rica','Indonesia','Israel',
  'República Checa','Japón','Hong Kong','India','Bolivia','Malasia',
  'Italia','India'
]);

function isPosting(lugar) {
  return COUNTRIES.has(lugar) || /^[A-Z][A-Z]/.test(lugar);
}

function renderGrid(members) {
  const grid = document.getElementById('members-grid');
  if (!members.length) {
    grid.innerHTML = `<div class="empty-state">
      <div class="big">🔍</div>
      <p>No se encontraron miembros con los criterios indicados</p>
    </div>`;
    return;
  }

  grid.innerHTML = members.map(m => {
    const lastPosting = m.adscripciones.find(a =>
      COUNTRIES.has(a.lugar) && a.fin === ''
    ) || m.adscripciones[0];

    const rankInitials = {
      'Embajador':'EMB','Ministro':'MIN','Consejero':'CON',
      'Primer Secretario':'1ER','Segundo Secretario':'2DO',
      'Tercer Secretario':'3ER','Vicecónsul':'VCE'
    };
    const badgeText = rankInitials[m.rangoActual] || m.rangoActual.substring(0,3).toUpperCase();

    return `<div class="member-card" onclick="showDetail(${m.num})">
      <div class="card-header">
        <div class="rank-badge">${badgeText}</div>
        <div class="card-name-area">
          <div class="card-num">Nº ${m.num}</div>
          <div class="card-name">${m.apellidos}</div>
          <div class="card-name" style="font-weight:300;font-size:.88rem">${m.nombre}</div>
          <div class="card-rank">${m.rangoActual}</div>
        </div>
      </div>
      <div class="card-meta">
        ${m.idiomas.slice(0,4).map(l => `<span class="tag lang">${l}</span>`).join('')}
        ${lastPosting ? `<span class="tag loc">📍 ${lastPosting.lugar}</span>` : ''}
      </div>
      <div class="card-detail">
        <span>Ing. SEM: ${m.ingresoSEM}</span>
        <span>${m.antAbsoluta}</span>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════════════
function showDetail(num) {
  const m = allMembers.find(x => x.num === num);
  if (!m) return;

  document.getElementById('detail-name').textContent = `${m.apellidos}, ${m.nombre}`;

  const postings = m.adscripciones.filter(a => COUNTRIES.has(a.lugar));
  const internal = m.adscripciones.filter(a => !COUNTRIES.has(a.lugar));

  document.getElementById('detail-body').innerHTML = `
    <!-- Personal -->
    <div class="detail-section">
      <h4>Datos Personales</h4>
      <div class="detail-grid">
        <div class="dg-item"><label>Lugar de Nacimiento</label><span>${m.nacimiento}</span></div>
        <div class="dg-item"><label>Fecha de Nacimiento</label><span>${m.fechaNac}</span></div>
        <div class="dg-item"><label>Escolaridad</label><span>${m.escolaridad}</span></div>
        <div class="dg-item"><label>Especialidad</label><span>${m.especialidad}</span></div>
        <div class="dg-item"><label>Deps. Económicos</label><span>${m.depsEcon}</span></div>
        <div class="dg-item"><label>Antigüedad Absoluta</label><span>${m.antAbsoluta}</span></div>
      </div>
    </div>

    <!-- Ingreso -->
    <div class="detail-section">
      <h4>Ingreso al Servicio</h4>
      <div class="detail-grid">
        <div class="dg-item"><label>Ingreso a la SRE</label><span>${m.ingresoSRE}</span></div>
        <div class="dg-item"><label>Ingreso al SEM</label><span>${m.ingresoSEM}</span></div>
        <div class="dg-item"><label>Ant. Relativa</label><span>${m.antRelativa}</span></div>
      </div>
    </div>

    <!-- Idiomas -->
    <div class="detail-section">
      <h4>Idiomas</h4>
      <div class="langs-row">${m.idiomas.map(l =>
        `<span class="lang-pill">${l}</span>`).join('')}
      </div>
    </div>

    <!-- Rangos -->
    <div class="detail-section">
      <h4>Trayectoria de Rangos</h4>
      <div class="ranks-row">${m.rangos.map(r =>
        `<span class="rank-pill">${r.rango} <span style="opacity:.5">${r.fecha}</span></span>`
      ).join('')}</div>
    </div>

    <!-- Adscripciones en el exterior -->
    ${postings.length ? `
    <div class="detail-section">
      <h4>Adscripciones en el Exterior</h4>
      <div class="timeline">
        ${postings.map(a => `
          <div class="tl-item posting">
            <div class="tl-adscripcion posting-name">📍 ${a.lugar}</div>
            <div class="tl-funcion">${a.funcion}</div>
            <div class="tl-period">${a.inicio}${a.fin ? ' → ' + a.fin : ' → presente'}</div>
          </div>`).join('')}
      </div>
    </div>` : ''}

    <!-- Adscripciones internas -->
    ${internal.length ? `
    <div class="detail-section">
      <h4>Adscripciones Internas / SRE</h4>
      <div class="timeline">
        ${internal.map(a => `
          <div class="tl-item">
            <div class="tl-adscripcion">${a.lugar}</div>
            <div class="tl-funcion">${a.funcion !== '*' ? a.funcion : '—'}</div>
            <div class="tl-period">${a.inicio}${a.fin ? ' → ' + a.fin : ''}</div>
          </div>`).join('')}
      </div>
    </div>` : ''}
  `;

  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail(e) {
  if (e.target === document.getElementById('detail-overlay')) closeDetailPanel();
}
function closeDetailPanel() {
  document.getElementById('detail-overlay').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetailPanel();
});

// ═══════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════
init();
</script>
</body>
</html>
